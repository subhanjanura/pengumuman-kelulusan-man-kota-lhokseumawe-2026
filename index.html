<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Kelulusan MAN Kota Lhokseumawe 2025/2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between">

    <div class="container mx-auto px-4 py-10 max-w-lg">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 text-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Pengumuman Kelulusan</h1>
            <p class="text-sm text-slate-500 font-semibold uppercase tracking-wider mb-6">MAN Kota Lhokseumawe • TA 2025/2026</p>
            
            <p class="text-sm text-slate-600 mb-6">Masukkan NISN atau NIS untuk melihat status kelulusan Anda.</p>

            <div class="mb-5">
                <input type="text" id="nisnInput" placeholder="Contoh: 10012025" 
                       class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent text-center text-lg tracking-wider font-semibold">
            </div>

            <button onclick="cekKelulusan()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 shadow-md shadow-emerald-600/20">
                <i class="fa-solid fa-magnifying-glass mr-2"></i> Periksa Status
            </button>
        </div>

        <div id="hasil" class="hidden p-6 rounded-2xl shadow-sm text-center transition-all duration-300 border">
            <h3 class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-1">Hasil Kelulusan</h3>
            <p id="namaSiswa" class="text-xl font-bold text-slate-800 mb-2"></p>
            <p id="infoSiswa" class="text-sm text-slate-500 mb-6"></p>
            
            <div id="badgeStatus" class="inline-block px-6 py-3 rounded-xl font-extrabold text-lg tracking-wider text-white shadow-sm">
                <span id="statusKelulusan"></span>
            </div>
        </div>
    </div>

    <footer class="text-center py-6 text-xs text-slate-400">
        &copy; 2026 MAN Kota Lhokseumawe.
    </footer>

    <script>
        // Data siswa yang disimulasikan
        const dataKelulusan = [
            { nisn: "10012025", nama: "Ahmad Zaki", jurusan: "IPA", status: "LULUS" },
            { nisn: "10012026", nama: "Siti Rahma", jurusan: "IPS", status: "LULUS" },
            { nisn: "10012027", nama: "Budi Pratama", jurusan: "Keagamaan", status: "BELUM LULUS" }
        ];

        function cekKelulusan() {
            const input = document.getElementById('nisnInput').value.trim();
            const hasilDiv = document.getElementById('hasil');
            const namaSiswa = document.getElementById('namaSiswa');
            const infoSiswa = document.getElementById('infoSiswa');
            const statusKelulusan = document.getElementById('statusKelulusan');
            const badgeStatus = document.getElementById('badgeStatus');

            // Cek apakah input kosong
            if (input === "") {
                alert("Silakan masukkan NISN/NIS terlebih dahulu.");
                return;
            }

            // Mencari data
            const siswa = dataKelulusan.find(s => s.nisn === input);

            hasilDiv.classList.remove('hidden');

            if (siswa) {
                namaSiswa.textContent = siswa.nama;
                infoSiswa.textContent = `NISN: ${siswa.nisn} | Jurusan: ${siswa.jurusan}`;

                if (siswa.status === "LULUS") {
                    hasilDiv.className = "p-6 rounded-2xl shadow-sm text-center bg-emerald-50 border border-emerald-100";
                    statusKelulusan.textContent = "LULUS";
                    badgeStatus.className = "px-6 py-3 rounded-xl font-extrabold text-lg tracking-wider text-white bg-emerald-600";
                } else {
                    hasilDiv.className = "p-6 rounded-2xl shadow-sm text-center bg-red-50 border border-red-100";
                    statusKelulusan.textContent = "BELUM LULUS";
                    badgeStatus.className = "px-6 py-3 rounded-xl font-extrabold text-lg tracking-wider text-white bg-red-600";
                }
            } else {
                hasilDiv.className = "p-6 rounded-2xl shadow-sm text-center bg-amber-50 border border-amber-100";
                namaSiswa.textContent = "Data tidak ditemukan.";
                infoSiswa.textContent = "Periksa kembali NISN/NIS yang Anda masukkan.";
                badgeStatus.className = "hidden";
            }
        }
    </script>
</body>
</html>
